name: Build and Push Docker Images

on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push sukima-api image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: sukima-web/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/sukima-api:latest

      - name: Build and push sukima-batch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: sukima-batch/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/sukima-batch:latest
