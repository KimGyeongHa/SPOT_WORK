version: '3.8'

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: sukima-db
    environment:
      POSTGRES_DB: sukima
      POSTGRES_USER: sukima
      POSTGRES_PASSWORD: sukima1234
    ports:
      - "5432:5432"
    volumes:
      - sukima-db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U sukima -d sukima" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2
    container_name: sukima-redis
    command: redis-server --notify-keyspace-events Ex
    ports:
      - "6379:6379"
    volumes:
      - sukima-redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sukima-db-data:
  sukima-redis-data:
